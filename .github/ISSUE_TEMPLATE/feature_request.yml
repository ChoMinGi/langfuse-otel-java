name: Feature Request
description: Suggest a new feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work? Include API examples if possible.

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - langfuse-otel-core
        - langfuse-otel-spring-boot-starter
        - New module
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you've considered.
