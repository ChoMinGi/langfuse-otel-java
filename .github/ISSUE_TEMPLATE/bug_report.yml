name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure with...
        2. Call...
        3. Observe...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.

  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - langfuse-otel-core
        - langfuse-otel-spring-boot-starter
        - Examples
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Library version
      placeholder: "0.1.0"

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "17"

  - type: dropdown
    id: framework
    attributes:
      label: LLM Framework
      options:
        - Spring AI
        - LangChain4j
        - None (standalone)
        - Other
