name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [11, 17, 21]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Core Unit Test
        run: mvn test --batch-mode --no-transfer-progress -pl langfuse-otel-core -am

  starter:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Baseline: minimum supported versions
          - java: 17
            spring-ai-version: '1.0.0'
            langchain4j-version: '1.0.0'
          - java: 21
            spring-ai-version: '1.0.0'
            langchain4j-version: '1.0.0'
          # Latest stable
          - java: 17
            spring-ai-version: '1.1.6'
            langchain4j-version: '1.14.1'
          - java: 21
            spring-ai-version: '1.1.6'
            langchain4j-version: '1.14.1'
          # Experimental: Spring AI 2.0 milestone
          - java: 17
            spring-ai-version: '2.0.0-M6'
            langchain4j-version: '1.14.1'
            experimental: true
          - java: 21
            spring-ai-version: '2.0.0-M6'
            langchain4j-version: '1.14.1'
            experimental: true
    name: starter (java-${{ matrix.java }}, spring-ai-${{ matrix.spring-ai-version }}, lc4j-${{ matrix.langchain4j-version }})
    continue-on-error: ${{ matrix.experimental || false }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Starter Unit Test
        run: >-
          mvn test --batch-mode --no-transfer-progress
          -pl langfuse-otel-spring-boot-starter -am
          -Dspring-ai.version=${{ matrix.spring-ai-version }}
          -Dlangchain4j.version=${{ matrix.langchain4j-version }}

  integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [core, starter]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Integration Tests
        if: env.LANGFUSE_PUBLIC_KEY != ''
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          LANGFUSE_TEST_PROMPT_NAME: ${{ secrets.LANGFUSE_TEST_PROMPT_NAME }}
        run: mvn test --batch-mode --no-transfer-progress -pl langfuse-otel-core -am -DexcludedGroups= -Dgroups=integration
